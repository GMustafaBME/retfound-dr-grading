# RETFound Fine-tuning Configuration

model:
  name: retfound_vit_large
  pretrained: true
  num_classes: 5
  drop_rate: 0.1

training:
  epochs: 50
  batch_size: 16
  learning_rate: 0.0001
  weight_decay: 0.05
  warmup_epochs: 5
  scheduler: cosine

data:
  image_size: 224
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15
  augmentation: true

evaluation:
  metrics: [auroc, sensitivity, specificity, kappa]
  grad_cam: true
